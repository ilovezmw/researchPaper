{% extends "base.html" %}
{% block title %}控制台 — 论文格式化门户{% endblock %}
{% block content %}
<h1 class="h4 mb-4">控制台</h1>

<div class="row g-4">
  <div class="col-lg-6">
    <div class="card shadow-sm h-100">
      <div class="card-header">格式化原始 DOCX</div>
      <div class="card-body">
        <p class="text-muted small">上传论文初稿，系统按参考样式生成可下载的 DOCX。</p>
        <div id="format-drop" class="drop-zone border rounded p-4 text-center mb-3">
          <p class="mb-2">拖拽 .docx 到此处，或</p>
          <input type="file" id="format-file" accept=".docx,application/vnd.openxmlformats-officedocument.wordprocessingml.document" class="d-none">
          <button type="button" class="btn btn-outline-secondary btn-sm" id="format-pick">选择文件</button>
          <p class="small text-muted mt-2 mb-0" id="format-name">未选择文件</p>
        </div>
        <button type="button" class="btn btn-primary" id="format-btn" disabled>格式化</button>
        <div id="format-status" class="small mt-3 text-secondary"></div>
        <div id="format-download-wrap" class="mt-3 d-none">
          <a href="#" id="format-download" class="btn btn-success btn-sm" target="_blank" rel="noopener">下载格式化 DOCX</a>
        </div>
      </div>
    </div>
  </div>

  <div class="col-lg-6">
    <div class="card shadow-sm h-100">
      <div class="card-header">上传最终 DOCX 到 GitHub</div>
      <div class="card-body">
        <p class="text-muted small">本地审阅通过后上传；需配置服务端 <code>GITHUB_TOKEN</code>。</p>
        <div class="mb-2">
          <label for="format-id" class="form-label small mb-0">关联格式化记录 ID（可选）</label>
          <input type="number" class="form-control form-control-sm" id="format-id" placeholder="留空则仅记录发布">
        </div>
        <div id="publish-drop" class="drop-zone border rounded p-4 text-center mb-3">
          <p class="mb-2">拖拽最终 .docx 到此处，或</p>
          <input type="file" id="publish-file" accept=".docx,application/vnd.openxmlformats-officedocument.wordprocessingml.document" class="d-none">
          <button type="button" class="btn btn-outline-secondary btn-sm" id="publish-pick">选择文件</button>
          <p class="small text-muted mt-2 mb-0" id="publish-name">未选择文件</p>
        </div>
        <button type="button" class="btn btn-primary" id="publish-btn" disabled>上传发布</button>
        <div id="publish-status" class="small mt-3 text-secondary"></div>
        <div id="publish-url-wrap" class="mt-3 d-none">
          <label class="form-label small">直链（可直接下载 / 打开文件，可复制）</label>
          <input type="text" class="form-control form-control-sm" id="publish-url" readonly>
          <p class="small text-muted mt-1 mb-0 d-none" id="publish-blob-hint"></p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script src="/static/js/dashboard.js"></script>
{% endblock %}
