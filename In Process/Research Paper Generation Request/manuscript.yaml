title: An Asynchronous Three-Tier Orchestration Framework for Low-Latency and High-Precision Agentic Retrieval-Augmented Generation
author: Mingwei Zhang
affiliation: Independent Researcher
location: Singapore
date: March 2026
output_stem: Agentic_RAG_Three_Tier_Framework_March_2026
abstract: The operational efficacy of Large Language Model (LLM) agents is fundamentally constrained by a critical "latency-precision" trade-off. While users demand sub-second responsiveness to maintain cognitive flow, high-precision tasks—particularly those involving code repository analysis and multi-source knowledge synthesis—require exhaustive retrieval and iterative reasoning that often span several seconds or minutes. This paper introduces a novel three-tier architectural framework designed to decouple immediate user feedback from resource-intensive background computation. Tier-0 utilizes lightweight, deterministic processing to deliver reflexive responses within the 100ms-300ms human perceptual threshold. Tier-1 employs an asynchronous parallel orchestration layer, utilizing Redis Streams and filterable HNSW indexing in Qdrant, to perform high-fidelity retrieval across structured SQL databases, vector stores, and external GitHub repositories. Tier-2 implements a cognitive update loop
  that synthesizes background results upon user re-engagement, facilitating stateful session recovery and secure knowledge base writeback via Pull Request workflows. Our analysis demonstrates that this hierarchical approach reduces perceived latency by up to 90% while maintaining the rigorous factual grounding required for enterprise-grade autonomous agents.
sections:
- heading: 1. Introduction
  paragraphs:
  - The transition from static retrieval-augmented generation (RAG) to autonomous LLM agents represents a paradigm shift in artificial intelligence, enabling systems that do not merely respond to queries but autonomously plan and execute complex workflows.1 However, the real-world deployment of these agentic systems is frequently hampered by significant response delays. These delays arise from the inherent serial nature of the "thought-action-observation" loop, where the agent must wait for model inference, external tool invocation, and knowledge retrieval before providing any output to the user.4
  - Human-Computer Interaction (HCI) research has established firm psychological boundaries for system latency. A response time of 100 milliseconds is perceived as instantaneous, allowing users to feel a sense of direct manipulation.6 A delay of 1 second is the limit for maintaining a seamless flow of thought; beyond this, users notice the delay and their sense of control diminishes.7 Most critically, delays exceeding 10 seconds lead to a catastrophic drop in engagement, as the user’s short-term memory decays and attention shifts to other tasks.7 Current frontier LLM agents often operate in the 10s to 60s range, placing them firmly in the "unpleasant" or "distracting" category for interactive applications.8
  - To bridge the gap between these perceptual requirements and the computational demands of high-precision retrieval, we propose a three-tier asynchronous architecture. This framework is inspired by the Dual-Process Theory of cognition, which posits that human intelligence relies on a fast, intuitive "System 1" for immediate reactions and a slow, deliberate "System 2" for complex reasoning.12 By mapping these cognitive patterns onto a distributed software architecture, we can provide immediate, empathetic feedback through a fast-path while delegating the "heavy lifting" of retrieval to a robust background orchestration layer.15
  - The core of our contribution lies in the engineering of a recoverable update loop. Unlike traditional systems that may lose context if a user leaves a session during a long-running retrieval, our architecture persists the state of the "Slow Thinking" process in a durable data layer.15 When the user returns, the system performs a cognitive synthesis of the newly acquired information, providing an updated solution and a plan for persistent knowledge modification.15 This ensures that the agent evolves alongside the conversation, transforming from a simple chatbot into a stateful, learning entity.19
- heading: 2. Related Work
  paragraphs:
  - Evolution of Retrieval-Augmented Generation (RAG)
  - Initial "Naive RAG" systems followed a linear "retrieve-then-read" pattern, fetching a fixed set of documents based on a single query.21 While effective for simple question-answering, these systems exhibited brittleness in knowledge-intensive and multi-hop tasks.18 Advanced RAG paradigms introduced pre-retrieval optimizations, such as query expansion and hybrid search, and post-retrieval techniques like re-ranking.24
  - The emergence of "Agentic RAG" signifies the move toward modular, policy-driven reasoning trajectories.18 In these architectures, the LLM acts as an orchestrator, deciding adaptively which tools to invoke and whether to iterate on the retrieval process.26 However, the increased complexity of these agentic loops exponentially increases latency, making them less suitable for real-time voice or chat interactions.29
  - Latency Optimization in Multi-Agent Systems
  - Recent research into multi-agent systems (MAS) has highlighted the superlinear growth of coordination overhead as the number of agents increases.30 To mitigate this, researchers have explored hierarchical planning and parallel tool invocation.1 Frameworks like "Hyperion" jointly optimize model partitioning and request scheduling across heterogeneous compute nodes to minimize end-to-end latency.1 Others, such as "VoiceAgentRAG," utilize a dual-agent structure where a "Fast Talker" foreground agent checks a semantic cache while a "Slow Thinker" background agent prefetches documents.29 Our proposed architecture builds on these concepts by formalizing the transition between these modes and introducing a dedicated update tier for long-horizon session management.
  - Human Perceptual Thresholds and UI Responsiveness
  - The "Doherty Threshold" suggests that productivity increases significantly when the system responds within 400ms.32 Usability engineering advocates for providing visual feedback (e.g., progress indicators or streaming text) to mask unavoidable delays.8 The concept of "Time-To-First-Token" (TTFT) has become a primary metric for evaluating LLM serving systems, emphasizing the need for rapid initial output.4 Our three-tier design internalizes these HCI findings, using Tier-0 to meet the 100-300ms feedback target regardless of the total retrieval time.
- heading: 3. Proposed System Architecture
  paragraphs:
  - The overall framework is conceptualized as a multi-layered response pipeline, as depicted in the primary architecture diagram (Figure 1). This design utilizes a Python-based orchestration layer to coordinate a high-performance data stack.
  - 'Figure 1: Overall Architecture of the Three-Tier Agent Response System'
  - '(Reference to the user-provided architecture diagram): As shown in Figure 1, the architecture initiates with a dual-path ingestion process. The system distinguishes between "Normal Chat" (reflexive feedback) and "Chat with Content" (precision retrieval). The core orchestration is divided into two primary logical units: Q1 (Tier-0 Fast Path) and Q2 (Tier-1 Async Retrieval Path). These units interact with a distributed storage layer comprising Redis for state and messaging, an SQL database for durable JSONB storage, and Qdrant for semantic vector retrieval. External knowledge is integrated via a bidirectional GitHub interface, allowing for both the retrieval of source code and the writeback of updated knowledge domains.'
  - 'Tier-0: The Reflexive Fast-Path (System 1)'
  - Tier-0 represents the system’s immediate response mechanism. Upon receiving a user message, the Python ingestor performs a series of "low-cost, deterministic" operations.15 This includes text segmentation, lightweight tagging for emotion and intent classification (e.g., using lightweight BERT-based models or rule-based systems), and quick context synthesis from the active Redis session.15
  - The primary goal of this tier is to achieve a Time-to-Visible (TTV) response within 150–300ms.15 The generated response is designed to be empathetic and directional; it acknowledges the user's request, provides an initial framework or a "next step" to keep the user engaged, and explicitly commits to a deeper background search.15 By using streaming output, the system ensures that the user perceives the response as "instant," even while the heavier I/O operations are just beginning.7
  - 'Tier-1: Asynchronous Precision Retrieval (System 2)'
  - 'Concurrent with the Tier-0 response, the system initiates Tier-1: the "Asynchronous Precision Path".15 An Orchestrator enqueues a fan-out retrieval plan into Redis Streams.15 A pool of background workers, operating under a consumer group model, independently execute high-latency tasks:'
  - 'SQL/JSONB Search: Workers query the PostgreSQL database for durable historical events and structured metadata, leveraging GIN indexes for rapid filtering.38'
  - 'Qdrant Vector Retrieval: Workers perform semantic searches using HNSW indexes. This process is "filter-aware," using payload metadata (e.g., tenant ID, project scope) to prune the search space before traversal.39'
  - 'GitHub Knowledge Sourcing: For queries involving technical documentation or code, workers interact with the GitHub API to fetch relevant files, issues, or pull requests.41'
  - The results are written back to Redis and associated with a unique run_id.15 This tier is designed to complete within 2–8 seconds, ensuring that high-confidence evidence is available before the user's attention drifts or they provide their next input.7
  - 'Tier-2: Cognitive Update and Persistent Writeback'
  - Tier-2 governs the "Resume-time" interaction.15 It is triggered when the system detects that a user has re-engaged with the conversation. The "Resume Detector" checks Redis for completed Tier-1 results.15 If new evidence is found, the system synthesizes a "Progress Summary + Solution Update".15
  - This tier goes beyond simple answering by providing a "Patch Plan" for knowledge management.15 If the agent identifies necessary changes to the underlying knowledge base (e.g., updating a README in GitHub or modifying a project parameter in the SQL store), it generates a structured change proposal.15 This enables a recoverable update loop, where the system’s "memory" is continuously refined through interaction.16
- heading: 4. Data Storage and Indexing Strategies
  paragraphs:
  - Data Storage and Indexing Strategies
  - A robust multi-tier system requires a sophisticated data layer that balances low-latency access with strong durability and high-dimensional search capabilities.43
  - 'Redis: State, Task Queuing, and Secondary Indexing'
  - 'Redis serves as the central "nerve center" of the architecture, performing three distinct roles: session state management, task orchestration via Streams, and secondary indexing of JSON documents.15'
  - Task Orchestration with Redis Streams
  - We utilize Redis Streams for Tier-1 job distribution because it provides superior reliability compared to simple list-based queues.46 By using XREADGROUP, we enable a distributed worker pool where each task is tracked via the Pending Entries List (PEL).15 If a worker fails, the system can use XPENDING and XCLAIM to reassign the task, ensuring that the critical retrieval path is never permanently blocked.48
  - Redis Search and JSON Type
  - Conversational snapshots are stored as Redis JSON documents, allowing for partial updates and structured retrieval.15 We define secondary indexes using FT.CREATE to enable rapid filtering of active sessions based on user preferences or temporal windows.15
  - 'PostgreSQL: Durable JSONB Storage and GIN Indexing'
  - PostgreSQL acts as the "source of truth" for long-term memory and audit trails.44 We utilize the JSONB data type to store the evolution of agent traces, providing the flexibility to accommodate changing model outputs without frequent schema migrations.38
  - 'To maintain performance as the message volume grows, we implement a multi-faceted indexing strategy 38:'
  - 'GIN (Generalized Inverted Index): Specifically jsonb_path_ops for high-performance containment queries (@>), which is essential for filtering by nested sentiment or intent tags.15'
  - 'Expression Indexes: We create B-Tree indexes on specific JSON paths (e.g., (tags->>''primary_intent'')) to accelerate common filtering patterns that would otherwise require expensive sequential scans of the TOAST storage.38'
  - 'Qdrant: Semantic Retrieval and Filterable HNSW'
  - Semantic retrieval is powered by Qdrant, which implements a bespoke modification of the HNSW (Hierarchical Navigable Small World) algorithm.55 In multi-tenant environments, it is crucial to constrain vector searches within specific boundaries (e.g., a single user's repository) to ensure data privacy and search precision.39
  - 'We implement "Integrated Filtering" by explicitly defining "Payload Indexes" for categorical and scalar fields.40 This allows the Qdrant query planner to optimize the HNSW traversal:'
  - 'Low Selectivity: If the filter matches a large portion of the collection, the system performs a standard HNSW search but skips non-matching points during the link-traversal stage.39'
  - 'High Selectivity: If the filter is extremely restrictive (e.g., searching for a single file ID), the system may bypass the graph index entirely for a linear scan, avoiding the "connectivity fragmentation" problem that plagues naive HNSW filtering.39'
  - 'External Knowledge Integration: The GitHub Case Study'
  - The integration of GitHub as an external knowledge source provides a unique opportunity for agents to reason over live codebases, but it introduces significant operational challenges regarding rate limits and consistency.41
  - Inbound Retrieval and Conditional Caching
  - To support Tier-1 retrieval, we implement a "GitHub Adapter" that manages API interactions.15 Given GitHub’s strict secondary rate limits—particularly for the /search/code endpoint—we utilize a serialized request queue to prevent triggering 403/429 errors.15
  - Furthermore, we implement conditional requests using ETags.15 The system stores the ETag for every retrieved file in Redis. Subsequent requests include the If-None-Match header. If the file is unchanged, GitHub returns a 304 Not Modified response, which consumes minimal quota and allows the agent to use the version already indexed in the internal SQL/Vector store.15
  - Outbound Knowledge Writeback
  - 'Tier-2 allows the agent to propose updates to the GitHub repository.15 We enforce a "Safety-First" writeback policy 15:'
  - 'Branch Creation: Instead of committing to the default branch, the agent creates a new "proposal" branch.'
  - 'Pull Request (PR): The agent opens a PR containing the generated patch, providing an auditable trail and a human-in-the-loop verification step.15'
  - 'Blob Consistency: For direct file updates (if permitted), the agent must first fetch the latest sha of the target file to avoid concurrent edit conflicts, a standard requirement of the GitHub Contents API.15'
- heading: 5. Orchestration and Reliability Mechanisms
  paragraphs:
  - Orchestration and Reliability Mechanisms
  - In a distributed agentic system, ensuring that background tasks reach completion and maintain session coherence is critical.48
  - Parallelism and Idempotency
  - The Tier-1 Orchestrator decomposes the high-level goal into independent sub-tasks.43 For instance, a query about "optimizing Redis memory" might trigger parallel searches in SQL (historical issues), Qdrant (documentation embeddings), and GitHub (source code examples).15
  - To handle the inherent non-determinism of distributed systems, we implement idempotency at the worker level.15 Each sub-task is assigned a stable ID based on the (run_id, source, query_hash) triplet.15 Workers use a "SET NX EX" pattern in Redis to ensure that a single task is only executed by one worker at a time, even in the event of consumer rebalancing or retry-loop activation.15
  - Failure Modes and Automated Recovery
